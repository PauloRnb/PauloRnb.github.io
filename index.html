<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Evolution | 100% Fibra Óptica</title>
    <!-- LINK TO OUTPUT CSS -->
    <link rel="stylesheet" href="src/output.css">
    <!-- LINK TO GOOGLE ICONS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body class="min-w-[375px]">
    <nav class="w-full h-[5rem] bg-gray-50 px-8 py-3 flex items-center justify-between">
        <!-- BOX MENU CONTAINER -->
        <div class="max-w-7xl mx-auto w-full flex items-center justify-between">

            <!-- LOGO MENU -->
            <a href="#">
                <div class="flex items-center justify-center w-[190px]">
                    <img class="w-[190px]" src="src/assets/images/logonetevolution.png" alt="Logo Net Evolution">
                </div>
            </a>

            <!-- MENU ICON -->
            <button id="btn-menu"
                class="cursor-pointer w-[2.125rem] h-[2.125rem] flex items-center justify-center bg-blue-600 p-2 rounded-[0.5rem] select-none group transition duration-[.3s] focus:outline-2 focus:outline-offset-1 focus:outline-blue-600 focus:bg-transparent md:hidden">
                <i class='bx bx-menu text-white transition duration-[.3s] group-focus:text-blue-600 text-2xl'></i>
            </button>

            <div id="box-menu" class="bg-white w-full h-full fixed right-[-120%] top-0 border-l-[1px] border-l-white z-10 ease-in-out transition-all duration-500 flex flex-col items-center max-w-sm md:max-w-[600px]">
                <div class="w-full bg-blue-600 h-[4.063rem] flex items-center justify-between px-6">
                    <span class="text-white font-medium tracking-[0.01rem]">Menu De Navegação</span>
                    <!-- BUTTOM CLOSE -->
                    <button id="btn-close" class="cursor-pointer">
                        <i class='bx bx-plus-circle rotate-45 text-2xl text-white'></i>
                    </button>
                </div>
                <ul class="flex flex-col w-full">
                    <div class="bg-transparent">
                        <ul class="flex items-center gap-11 px-6 h-[6.25rem]">
                            <li>
                                <a href="#" class="text-base text-gray-500 font-normal select-none">Parceiros</a>
                            </li>
                            <li>
                                <a href="#" class="text-base text-gray-500 font-normal select-none">Indique Um Amigo</a>
                            </li>
                        </ul>
                    </div>
                    <div class="bg-gray-200 flex items-center gap-11 px-6 h-[3.438rem]">
                        <button class="flex items-center justify-center gap-x-1 select-none cursor-pointer">
                            <span class="text-[1.125rem] text-blue-600 font-medium">Assine Já</span>
                            <i class='bx bx-chevron-right text-2xl text-blue-600'></i>
                        </button>
                        <button class="flex items-center justify-center gap-x-1.5 select-none cursor-pointer">
                            <span class="text-[1.125rem] text-blue-600 font-medium">Área Do Cliente</span>
                            <i class='bx bx-chevron-right text-2xl text-blue-600'></i>
                        </button>
                    </div>
                    <li>
                        <button href="#"
                            class="w-full flex items-center justify-between px-6 py-8 border-b-[1px] border-gray-200 select-none cursor-pointer">
                            <span class="text-base text-gray-600 font-medium">Internet</span>
                            <i class='bx bx-chevron-right text-2xl text-gray-600'></i>
                        </button>
                    </li>
                    <li>
                        <button
                            class="w-full flex items-center justify-between px-6 py-8 border-b-[1px] border-gray-200 select-none cursor-pointer">
                            <span class="text-base text-gray-600 font-medium">Combos</span>
                        </button>
                    </li>
                    <li>
                        <button
                            class="w-full flex items-center justify-between px-6 py-8 border-b-[1px] border-gray-200 select-none cursor-pointer">
                            <span class="text-base text-gray-600 font-medium">Mais Serviços</span>
                            <i class='bx bx-chevron-right text-2xl text-gray-600'></i>
                        </button>
                    </li>
                    <li>
                        <button href="#"
                            class="w-full flex items-center justify-between px-6 py-8 border-b-[1px] border-gray-200 select-none cursor-pointer">
                            <span class="text-base text-gray-600 font-medium">Segurança</span>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- LINK TO JS -->
    <script src="src/assets/js/index.js"></script>
</body>

</html>
