<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarFrios | Tudo Para Seu Churrasco</title>

    <!-- Link To CSS -->
    <link rel="stylesheet" href="assets/css/index.css">
    <!-- Link To Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <!-- Link To SwiperJS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- Link To FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- HEADER / NAVIGATION -->
    <header class="header">
        <nav class="navigation nav">
            <!-- LOGO -->
            <a href="#" class="logo">Ma'RFRIOS</a>
            <!-- LIST -->
            <div class="list-card" id="list__card">
                <ul class="list">
                    <li>
                        <a href="#" class="links">Home</a>
                    </li>
                    <li>
                        <a href="#" class="links">Saiba Mais</a>
                    </li>
                    <li>
                        <a href="#" class="links">Delivery</a>
                    </li>
                </ul>

                <!--<div class="button">
                    <a href="#" class="btn-link">WhatsApp</a>
                </div>-->
                <!-- CLOSE MENU -->
                <div class="close-menu" id="close__menu">
                    <i class="ri-close-line"></i>
                </div>
            </div>
            <!-- BUTTON WPP -->
            <div class="button">
                <a href="#" class="btn-link">WhatsApp</a>
            </div>
            <!-- TOGGLE MENU -->
            <div class="toggle-menu" id="toggle__menu">
                <i class="ri-menu-line"></i>
            </div>
        </nav>
    </header>

    <!-- HOME PAGE -->
    <section class="home-section home">
        <div class="swiper">
            <!-- Additional required wrapper -->
            <div class="swiper-wrapper">
                <!-- Slides -->
                <div class="swiper-slide">
                    <a href="#">
                        <picture>
                            <source media="(max-width: 1023px)" srcset="assets/images/bannerslidemobilebg.png" type="image/png">
                            <img src="assets/images/bannerslidebg.png"
                                alt="Promoção de Final de Ano, melhores cortes para seu churrasco.">
                        </picture>
                    </a>
                </div>
                <div class="swiper-slide">
                    <a href="#">
                        <picture>
                            <source media="(max-width: 1023px)" srcset="assets/images/bannerslide2mobilebg.png" type="image/png">
                            <img src="assets/images/bannerslide2bg.png" alt="Aproveite as ofertas de Final de Ano.">
                        </picture>
                    </a>
                </div>
            </div>
            <!-- Pagination -->
            <div class="swiper-pagination"></div>

            <!-- Button Next / Button Prev -->
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
    </section>



    <!-- Link To SwiperJS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- Link To JS -->
    <script src="assets/javascript/index.js"></script>
</body>

</html>
